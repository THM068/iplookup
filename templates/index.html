<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Lookup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200">
    <div class="mx-auto max-w-2xl px-6 py-24">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight text-white mb-3">
                IP Lookup
            </h1>
            <p class="text-lg text-slate-400">
                Enter an IPv4 or IPv6 address to find its geolocation.
            </p>
        </div>

        <!-- Search form -->
        <form hx-get="/lookup"
              hx-target="#result"
              hx-trigger="submit"
              hx-swap="innerHTML"
              class="flex gap-3 mb-10">
            <input name="ip"
                   type="text"
                   autocomplete="off"
                   placeholder="8.8.8.8"
                   class="flex-1 rounded-xl border border-slate-700 bg-slate-900 px-5 py-4 text-lg text-white placeholder-slate-500 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30">
            <button type="submit"
                    class="rounded-xl bg-blue-600 px-7 py-4 text-lg font-semibold text-white shadow-sm transition hover:bg-blue-500 active:scale-95">
                Lookup
            </button>
        </form>

        <!-- Loading indicator -->
        <div id="spinner" class="htmx-indicator">
            <div class="flex items-center justify-center gap-3 py-10 text-slate-500">
                <svg class="h-6 w-6 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span class="text-sm">Looking up&hellip;</span>
            </div>
        </div>

        <!-- Result target -->
        <div id="result"></div>

        <!-- Footer -->
        <p class="mt-16 text-center text-xs text-slate-600">
            Powered by MaxMind GeoLite2 &middot; Pre-initialized with Wizer
        </p>
    </div>
</body>
</html>
