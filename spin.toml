#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "iplookup"
version = "0.1.0"
authors = ["admin <thando.mafela@gmail.com>"]
description = "GeoIP lookup — Wizer-pre-initialized MaxMind database"

[[trigger.http]]
route = "/..."
component = "iplookup"

[component.iplookup]
source = "target/wasm32-wasip1/release/iplookup.wasm"
allowed_outbound_hosts = []
[component.iplookup.build]
command = "cargo build --target wasm32-wasip1 --release && wizer --allow-wasi target/wasm32-wasip1/release/iplookup.wasm -o target/wasm32-wasip1/release/iplookup.wizered.wasm && mv target/wasm32-wasip1/release/iplookup.wizered.wasm target/wasm32-wasip1/release/iplookup.wasm"
watch = ["src/**/*.rs", "Cargo.toml", "templates/**/*.html", "GeoLite2-City_20260605/GeoLite2-City.mmdb"]
